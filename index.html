<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Batuhan Karakaya</title>

<style>

/* GENEL */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f19;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    display: flex;
    width: 1100px;
    background: #111827;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.7);
}

/* SIDEBAR */
.sidebar {
    width: 70px;
    background: #020617;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    border-right: 1px solid rgba(255,255,255,0.05);
}

.sidebar a {
    color: #aaa;
    text-decoration: none;
    font-size: 22px;
    transition: 0.3s;
}

.sidebar a:hover {
    color: #38bdf8;
    transform: scale(1.3);
}

/* SOL PANEL */
.left {
    width: 35%;
    background: url("https://rnu.lv/wp-content/uploads/2025/09/rnu-1.sept-min.jpg") center/cover;
    position: relative;
}

.left::after {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.6);
}

/* PROFIL */
.profile {
    position: absolute;
    bottom: 30px;
    left: 30px;
    z-index: 2;
}

.profile h1 {
    margin: 0;
    font-size: 32px;
}

.profile p {
    color: #38bdf8;
}

/* SAĞ PANEL */
.right {
    width: 65%;
    padding: 40px;
}

/* BAŞLIK */
.right h2 {
    font-size: 40px;
    margin-bottom: 10px;
}

.info {
    color: #38bdf8;
    margin-bottom: 20px;
}

.desc {
    color: #aaa;
    line-height: 1.6;
}

/* SKILLS */
.skills {
    margin-top: 30px;
}

.skill {
    margin-bottom: 20px;
}

.skill-name {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
}

.bar {
    height: 6px;
    background: #333;
    border-radius: 5px;
    margin-top: 5px;
}

.fill {
    height: 100%;
    background: #38bdf8;
    border-radius: 5px;
}

</style>

</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <a href="index.html">🏠</a>
        <a href="about.html">👤</a>
        <a href="projects.html">💻</a>
        <a href="contact.html">✉️</a>
    </div>

    <!-- SOL -->
    <div class="left">
        <div class="profile">
            <h1>Batuhan Karakaya</h1>
            <p>Student</p>
        </div>
    </div>

    <!-- SAĞ -->
    <div class="right">
        <h2>Welcome to My Website</h2>

        <div class="info">
            beginner dev / 1 year student in latvia / bachelor's degree (not yet)
        </div>

        <p class="desc">
            I made it this website for Amit Joshi's task.
        </p>

        <div class="skills">
            <h3>Skills</h3>

            <div class="skill">
                <div class="skill-name">
                    <span>Web Development</span>
                    <span>10%</span>
                </div>
                <div class="bar">
                    <div class="fill" style="width:10%"></div>
                </div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>Student</span>
                    <span>50%</span>
                </div>
                <div class="bar">
                    <div class="fill" style="width:50%"></div>
                </div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>Turkish</span>
                    <span>100%</span>
                </div>
                <div class="bar">
                    <div class="fill" style="width:100%"></div>
                </div>
            </div>

            <div class="skill">
                <div class="skill-name">
                    <span>Humor</span>
                    <span>100%</span>
                </div>
                <div class="bar">
                    <div class="fill" style="width:100%"></div>
                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
