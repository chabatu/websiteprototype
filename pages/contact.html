<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Contact - Batuhan Karakaya</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:#0b0f19;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.container {display:flex;width:1100px;background:#111827;border-radius:15px;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,0.7);}
.sidebar {width:70px;background:#020617;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;border-right:1px solid rgba(255,255,255,0.05);}
.sidebar a {color:#aaa;text-decoration:none;font-size:22px;transition:.3s;}
.sidebar a.active,.sidebar a:hover {color:#38bdf8;transform:scale(1.3);}
.left {width:35%;background:url("https://picsum.photos/500/700?person") center/cover;position:relative;}
.left::after {content:"";position:absolute;inset:0;background:rgba(0,0,0,0.6);}
.profile {position:absolute;bottom:30px;left:30px;z-index:2;}
.profile h1{margin:0;font-size:32px;}
.profile p{color:#38bdf8;}
.right {width:65%;padding:40px;}
.right h2{font-size:40px;margin-bottom:10px;}
form{display:flex;flex-direction:column;}
form input,form textarea{margin-bottom:15px;padding:12px;border-radius:8px;border:none;background:#020617;color:white;}
form input::placeholder,form textarea::placeholder{color:#888;}
form button{padding:12px;border:none;border-radius:8px;background:#38bdf8;color:black;font-weight:bold;cursor:pointer;transition:.3s;}
form button:hover{transform:scale(1.05);}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <a href="index.html">🏠</a>
    <a href="about.html">👤</a>
    <a href="projects.html">💻</a>
    <a href="contact.html" class="active">✉️</a>
  </div>
  <div class="left">
    <div class="profile">
      <h1>Batuhan Karakaya</h1>
      <p>Student</p>
    </div>
  </div>
  <div class="right">
    <h2>Contact Me</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send</button>
    </form>
  </div>
</div>
</body>
</html>
